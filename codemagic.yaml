workflows:
  # =====================================================
  # UNIFIED RELEASE â€” iOS + Android from a single build
  # Trigger: push a tag like v1.0.0
  # =====================================================
  release-both:
    name: Release (iOS + Android)
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    integrations:
      app_store_connect: admin
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.idealai.umax
      flutter: stable
      xcode: latest
      cocoapods: default
      java: 17
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.idealai.umax"
    scripts:
      - name: Extract version from pubspec
        script: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          if [ -z "$BUILD_NUMBER" ] || [ "$BUILD_NUMBER" = "$VERSION_NAME" ]; then
            BUILD_NUMBER=$PROJECT_BUILD_NUMBER
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> $CM_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android AAB
        script: |
          flutter build appbundle --release \
            --build-name=$VERSION_NAME \
            --build-number=$BUILD_NUMBER

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod repo update
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-name=$VERSION_NAME \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
        submit_as_draft: true
        changes_not_sent_for_review: true
      email:
        recipients:
          - nalhamzy@gmail.com
        notify:
          success: true
          failure: true

